# vim: ft=yaml.docker-compose

services:
  anthias-server:
    # Explicit image tag so anthias-celery below can reference the same
    # built image without a duplicate `build:` block (which would
    # produce a separate, byte-identical-but-distinct image tag).
    image: anthias-server:dev
    container_name: anthias
    hostname: anthias
    build:
      context: .
      dockerfile: ./docker/Dockerfile.server
    environment:
      - HOME=/data
      - LISTEN=0.0.0.0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ENVIRONMENT=development
    # caddynet so the reverse proxy can reach uvicorn; anthiasnet so
    # Channels / viewer pub-sub / Celery dispatch can reach redis
    # (the server was caddynet-only for a while, which left it either
    # unable to resolve `redis` or resolving another stack's redis on
    # the shared proxy network).
    networks:
      - caddynet
      - anthiasnet
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    volumes:
      - anthias-data:/data
      - ./:/usr/src/app/

  anthias-celery:
    # Reuses anthias-server:dev via the explicit image tag above.
    # Compose builds anthias-server first (it owns the build:) and
    # this service inherits the same image, only overriding CMD.
    image: anthias-server:dev
    depends_on:
      anthias-server:
        condition: service_started
      redis:
        condition: service_healthy
    # anthiasnet only — no inbound HTTP, and staying off the shared
    # caddynet means a `redis` container in another stack on that
    # network can never win the DNS lookup for our broker (that
    # collision made kombu flap between the two servers and fail with
    # the other stack's requirepass).
    networks:
      - anthiasnet
    command: >
      nice -n 19 ionice -c 3
      celery -A anthias_server.celery_tasks.celery worker -B -n worker@anthias
      --loglevel=info --scheduler celery.beat.Scheduler
    environment:
      - HOME=/data
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ENVIRONMENT=development
    restart: always
    volumes:
      - anthias-data:/data
      - ./:/usr/src/app/

  redis:
    platform: "linux/amd64"
    image: mirror.gcr.io/library/redis:alpine
    networks:
      - anthiasnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

volumes:
    anthias-data:
    redis-data:
networks:
  caddynet:
    external: true
  # Plain bridge, not `internal: true`: celery needs egress for
  # YouTube / remote-video downloads and internal networks block all
  # outbound traffic. Redis stays unreachable from outside the stack
  # regardless — it publishes no ports and only this network's
  # containers can see it.
  anthiasnet:
